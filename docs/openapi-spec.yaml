      responses:
        '200':
          description: Stats par catégorie
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    category:
                      type: string
                    count:
                      type: integer
                    percentage:
                      type: number

  /statistics/statuses:
    get:
      tags: [Statistics]
      summary: Répartition par statut
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stats par statut

  /statistics/performance:
    get:
      tags: [Statistics]
      summary: Statistiques de performance globales
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Performance globale
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalPerformanceStats'

  /statistics/technicians:
    get:
      tags: [Statistics]
      summary: Statistiques par technicien
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stats par technicien

  # ==================== PERFORMANCE ====================
  /performance/technicians:
    get:
      tags: [Performance]
      summary: Performances des techniciens par période
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly, yearly]
      responses:
        '200':
          description: Performances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TechnicianPerformance'

  /performance/trends:
    get:
      tags: [Performance]
      summary: Tendances de performance
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Tendances

  /performance/zones:
    get:
      tags: [Performance]
      summary: Zones d'intervention (heatmap)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ZoneStats'

  /performance/top-technicians:
    get:
      tags: [Performance]
      summary: Top techniciens
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 7
      responses:
        '200':
          description: Top techniciens

  # ==================== CONFIGURATION ====================
  /configuration/dispatch-algorithm:
    get:
      tags: [Configuration]
      summary: Configuration de l'algorithme de dispatch
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Configuration active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchAlgorithmConfig'
    put:
      tags: [Configuration]
      summary: Mettre à jour la config de dispatch
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                weightProximity:
                  type: integer
                weightSkills:
                  type: integer
                weightWorkload:
                  type: integer
                weightRating:
                  type: integer
                reason:
                  type: string
      responses:
        '200':
          description: Configuration mise à jour

  /configuration/history:
    get:
      tags: [Configuration]
      summary: Historique des changements de configuration
      security:
        - bearerAuth: []
      parameters:
        - name: tableName
          in: query
          schema:
            type: string
        - name: recordId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Historique
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ConfigurationHistoryEntry'

  # ==================== PRICING ====================
  /pricing/priority-multipliers:
    get:
      tags: [Pricing]
      summary: Liste des multiplicateurs de priorité
      responses:
        '200':
          description: Multiplicateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PriorityMultiplier'

  /pricing/priority-multipliers/{id}:
    patch:
      tags: [Pricing]
      summary: Modifier un multiplicateur
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [multiplier]
              properties:
                multiplier:
                  type: number
      responses:
        '200':
          description: Multiplicateur mis à jour

  # ==================== HISTORY ====================
  /history/intervention/{interventionId}:
    get:
      tags: [Interventions]
      summary: Historique d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Historique
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InterventionHistory'
    post:
      tags: [Interventions]
      summary: Ajouter une entrée d'historique
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, action]
              properties:
                userId:
                  type: string
                  format: uuid
                action:
                  type: string
                oldValue:
                  type: string
                  nullable: true
                newValue:
                  type: string
                  nullable: true
                comment:
                  type: string
                  nullable: true
      responses:
        '201':
          description: Entrée ajoutée

  # ==================== QUESTIONNAIRE ====================
  /questionnaire/tree:
    get:
      tags: [Questionnaire]
      summary: Arbre complet du questionnaire dynamique
      description: |
        Retourne l'arbre de questions/réponses/résultats pour tous les domaines.
        Structuré par domaine (plumbing, locksmith, etc.) avec questions imbriquées.
      responses:
        '200':
          description: Arbre du questionnaire
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: '#/components/schemas/QuestionnaireDomain'

  # ==================== INVOICE ====================
  /invoice/generate:
    post:
      tags: [Invoice]
      summary: Générer et télécharger une facture PDF
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interventionId]
              properties:
                interventionId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Facture PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /invoice/send-email:
    post:
      tags: [Invoice]
      summary: Envoyer la facture par email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interventionId]
              properties:
                interventionId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Email envoyé
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  # ==================== SITE SETTINGS ====================
  /site-settings:
    get:
      tags: [SiteSettings]
      summary: Obtenir un paramètre du site
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Paramètre
          content:
            application/json:
              schema:
                type: object
                properties:
                  settingKey:
                    type: string
                  settingValue:
                    type: string

  # ==================== NOTIFICATIONS (Edge Functions) ====================
  /notifications/status-change:
    post:
      tags: [Notifications]
      summary: Notifier le client d'un changement de statut
      description: Envoie email (Resend), SMS (Twilio) et push (FCM)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interventionId, newStatus]
              properties:
                interventionId:
                  type: string
                  format: uuid
                newStatus:
                  type: string
                oldStatus:
                  type: string
      responses:
        '200':
          description: Notifications envoyées
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  results:
                    type: object
                    properties:
                      email:
                        type: boolean
                      sms:
                        type: boolean
                      push:
                        type: boolean

  /notifications/quote-modification:
    post:
      tags: [Notifications]
      summary: Notifier le client d'une modification de devis
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [modificationId]
              properties:
                modificationId:
                  type: string
                  format: uuid
                clientEmail:
                  type: string
                  format: email
                  nullable: true
                clientPhone:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Notifications envoyées

  /notifications/welcome-admin:
    post:
      tags: [Notifications]
      summary: Envoyer un email de bienvenue admin/manager
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, firstName, lastName, role, tempPassword]
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
                  enum: [admin, manager]
                tempPassword:
                  type: string
                loginUrl:
                  type: string
                  format: uri
      responses:
        '200':
          description: Email envoyé

  # ==================== STORAGE ====================
  /storage/upload:
    post:
      tags: [Storage]
      summary: Upload générique de fichier
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [bucket, file]
              properties:
                bucket:
                  type: string
                  enum: [intervention-photos, technician-photos]
                folder:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: URL du fichier uploadé
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    format: uri

  /storage/delete:
    delete:
      tags: [Storage]
      summary: Supprimer un fichier
      security:
        - bearerAuth: []
      parameters:
        - name: bucket
          in: query
          required: true
          schema:
            type: string
        - name: fileUrl
          in: query
          required: true
          schema:
            type: string
            format: uri
      responses:
        '204':
          description: Fichier supprimé

  # ==================== GEOCODING ====================
  /geocoding/forward:
    get:
      tags: [Geocoding]
      summary: Géocodage d'une adresse
      description: Utilise Nominatim (OpenStreetMap) en interne
      parameters:
        - name: address
          in: query
          required: true
          schema:
            type: string
        - name: city
          in: query
          required: true
          schema:
            type: string
        - name: postalCode
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Coordonnées GPS
          content:
            application/json:
              schema:
                type: object
                properties:
                  latitude:
                    type: number
                    format: double
                  longitude:
                    type: number
                    format: double
                  displayName:
                    type: string

  /geocoding/reverse:
    get:
      tags: [Geocoding]
      summary: Reverse géocodage
      parameters:
        - name: latitude
          in: query
          required: true
          schema:
            type: number
            format: double
        - name: longitude
          in: query
          required: true
          schema:
            type: number
            format: double
      responses:
        '200':
          description: Adresse trouvée
          content:
            application/json:
              schema:
                type: object
                properties:
                  city:
                    type: string
                    nullable: true
                  department:
                    type: string
                    nullable: true
                  postalCode:
                    type: string
                    nullable: true
                  displayName:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ===== AUTH =====
    LoginCredentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    RegisterCredentials:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        isCompany:
          type: boolean
        companyName:
          type: string
        companyAddress:
          type: string
        siren:
          type: string
        vatNumber:
          type: string

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        user:
          $ref: '#/components/schemas/User'
        error:
          type: string
        requiresEmailVerification:
          type: boolean

    UserRole:
      type: string
      enum: [admin, manager, technician, client, guest]

    AppRole:
      type: string
      enum: [admin, manager, technician, client, guest]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean
        isCompany:
          type: boolean
        companyName:
          type: string
          nullable: true
        companyAddress:
          type: string
          nullable: true
        siren:
          type: string
          nullable: true
        vatNumber:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        companyLogoUrl:
          type: string
          nullable: true
        mustChangePassword:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserRoleRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/AppRole'
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid
          nullable: true

    ManagerPermissions:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        canCreateManagers:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        grantedBy:
          type: string
          format: uuid
          nullable: true

    # ===== INTERVENTIONS =====
    InterventionStatus:
      type: string
      enum: [new, pending_payment, payment_authorized, dispatching, assigned, on_route, arrived, in_progress, completed, cancelled]

    InterventionCategory:
      type: string
      enum: [locksmith, plumbing, electricity, glazing, heating, aircon]

    Intervention:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clientId:
          type: string
          format: uuid
          nullable: true
        technicianId:
          type: string
          format: uuid
          nullable: true
        category:
          $ref: '#/components/schemas/InterventionCategory'
        priority:
          type: string
          enum: [low, normal, urgent, emergency]
        status:
          $ref: '#/components/schemas/InterventionStatus'
        title:
          type: string
        description:
          type: string
        address:
          type: string
        city:
          type: string
        postalCode:
          type: string
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        estimatedPrice:
          type: number
          nullable: true
        finalPrice:
          type: number
          nullable: true
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        photos:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        trackingCode:
          type: string
          nullable: true
        clientEmail:
          type: string
          format: email
          nullable: true
        clientPhone:
          type: string
          nullable: true
        quoteSignedAt:
          type: string
          format: date-time
          nullable: true
        quoteSignatureData:
          type: string
          nullable: true
        quotePdfUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateInterventionRequest:
      type: object
      required: [category, address, city, postalCode]
      properties:
        clientId:
          type: string
          format: uuid
          nullable: true
        category:
          $ref: '#/components/schemas/InterventionCategory'
        description:
          type: string
        address:
          type: string
        city:
          type: string
        postalCode:
          type: string
        priority:
          type: string
          default: normal
        clientEmail:
          type: string
          format: email
        clientPhone:
          type: string
        photos:
          type: array
          items:
            type: string
        questionnaireAnswers:
          type: array
          items:
            type: string
        prixMin:
          type: number
          nullable: true
        prixMax:
          type: number
          nullable: true

    InterventionHistory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        interventionId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        action:
          type: string
        oldValue:
          type: string
          nullable: true
        newValue:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ===== DISPATCH =====
    DispatchResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        assignedTechnician:
          type: object
          properties:
            userId:
              type: string
              format: uuid
            score:
              type: number
            distanceKm:
              type: number
            estimatedArrivalMinutes:
              type: number
        timeoutAt:
          type: string
          format: date-time
        totalCandidates:
          type: integer
        requiresManualAssignment:
          type: boolean
        newTechnicianId:
          type: string
          format: uuid

    DispatchAttempt:
      type: object
      properties:
        id:
          type: string
          format: uuid
        interventionId:
          type: string
          format: uuid
        technicianId:
          type: string
          format: uuid
        score:
          type: number
        scoreBreakdown:
          type: object
          properties:
            proximity:
              type: number
            skills:
              type: number
            workload:
              type: number
            rating:
              type: number
        status:
          type: string
          enum: [pending, accepted, rejected, timeout, cancelled]
        attemptOrder:
          type: integer
        notifiedAt:
          type: string
          format: date-time
          nullable: true
        respondedAt:
          type: string
          format: date-time
          nullable: true
        timeoutAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ===== QUOTES =====
    QuoteLine:
      type: object
      properties:
        id:
          type: string
          format: uuid
        interventionId:
          type: string
          format: uuid
        lineType:
          type: string
          enum: [displacement, security, repair]
        label:
          type: string
        basePrice:
          type: number
        multiplier:
          type: number
        calculatedPrice:
          type: number
        displayOrder:
          type: integer
        createdAt:
          type: string
          format: date-time

    QuoteLineInput:
      type: object
      required: [lineType, label, basePrice, multiplier]
      properties:
        lineType:
          type: string
          enum: [displacement, security, repair]
        label:
          type: string
        basePrice:
          type: number
        multiplier:
          type: number

    QuoteModification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        interventionId:
          type: string
          format: uuid
        createdBy:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, approved, declined]
        totalAdditionalAmount:
          type: number
        clientNotifiedAt:
          type: string
          format: date-time
          nullable: true
        clientRespondedAt:
          type: string
          format: date-time
          nullable: true
        notificationToken:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/QuoteModificationItem'

    QuoteModificationItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        modificationId:
          type: string
          format: uuid
        itemType:
          type: string
          enum: [service, equipment, other]
        label:
          type: string
        description:
          type: string
          nullable: true
        unitPrice:
          type: number
        quantity:
          type: integer
        totalPrice:
          type: number
        createdAt:
          type: string
          format: date-time

    CreateQuoteModificationInput:
      type: object
      required: [interventionId, createdBy, items]
      properties:
        interventionId:
          type: string
          format: uuid
        createdBy:
          type: string
          format: uuid
        items:
          type: array
          items:
            type: object
            required: [itemType, label, unitPrice, quantity]
            properties:
              itemType:
                type: string
                enum: [service, equipment, other]
              label:
                type: string
              description:
                type: string
              unitPrice:
                type: number
              quantity:
                type: integer

    # ===== SERVICES =====
    Service:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        isActive:
          type: boolean
        displayOrder:
          type: integer
        basePrice:
          type: number
        defaultPriority:
          type: string
        displacementPrice:
          type: number
        securityPrice:
          type: number
        repairPrice:
          type: number
        vatRateIndividual:
          type: number
        vatRateProfessional:
          type: number
        targetArrivalTimeMinutes:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ServiceUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        displacementPrice:
          type: number
        securityPrice:
          type: number
        repairPrice:
          type: number
        vatRateIndividual:
          type: number
        vatRateProfessional:
          type: number
        displayOrder:
          type: integer
        targetArrivalTimeMinutes:
          type: integer

    # ===== TECHNICIANS =====
    TechnicianWithLocation:
      type: object
      properties:
        id:
          type: string
