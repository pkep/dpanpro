openapi: 3.0.3
info:
  title: Depan.Pro API
  description: |
    Spécification OpenAPI complète de l'API backend Depan.Pro.
    Cette spécification documente tous les endpoints REST et les Edge Functions
    utilisés par le frontend React pour permettre une migration vers un backend Spring Boot.
  version: 1.0.0
  contact:
    name: Depan.Pro
    email: contact@depan-pro.com

servers:
  - url: https://api.depan-pro.com/v1
    description: Production
  - url: http://localhost:8080/v1
    description: Local Development (Spring Boot)

tags:
  - name: Auth
    description: Authentification et gestion de session
  - name: Users
    description: Gestion des utilisateurs
  - name: Roles
    description: Gestion des rôles et permissions
  - name: Interventions
    description: CRUD et gestion des interventions
  - name: Dispatch
    description: Dispatch automatique et assignation des techniciens
  - name: Quotes
    description: Devis et lignes de devis
  - name: QuoteModifications
    description: Modifications de devis en cours d'intervention
  - name: Services
    description: Configuration des services (serrurerie, plomberie, etc.)
  - name: Technicians
    description: Gestion des techniciens et géolocalisation
  - name: Partners
    description: Candidatures et profils partenaires
  - name: Ratings
    description: Notes et avis clients
  - name: Messages
    description: Messagerie intervention (technicien/client)
  - name: Photos
    description: Upload et gestion des photos
  - name: WorkPhotos
    description: Photos avant/après intervention
  - name: Payment
    description: Autorisation et capture de paiement (Stripe)
  - name: Cancellation
    description: Annulation d'intervention avec frais éventuels
  - name: Schedule
    description: Planning et disponibilités technicien
  - name: Revenue
    description: Revenus et commissions technicien
  - name: Statistics
    description: Statistiques globales
  - name: Performance
    description: Performance des techniciens
  - name: Configuration
    description: Configuration dispatch et historique
  - name: Pricing
    description: Multiplicateurs de priorité
  - name: Notifications
    description: Notifications email, SMS, push
  - name: Storage
    description: Upload et gestion de fichiers
  - name: Geocoding
    description: Géocodage et reverse géocodage
  - name: Questionnaire
    description: Arbre de questionnaire dynamique
  - name: Invoice
    description: Génération et envoi de factures
  - name: SiteSettings
    description: Paramètres globaux du site

paths:
  # ==================== AUTH ====================
  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion utilisateur
      description: |
        Vérifie l'email dans la table users, contrôle que le compte est actif,
        vérifie le mot de passe via bcrypt, et retourne l'objet User.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCredentials'
      responses:
        '200':
          description: Connexion réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Email ou mot de passe incorrect

  /auth/register:
    post:
      tags: [Auth]
      summary: Inscription client
      description: |
        Crée un utilisateur avec role=client, is_active=false.
        Hash le mot de passe via bcrypt. Envoie un email de vérification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterCredentials'
      responses:
        '201':
          description: Compte créé, email de vérification envoyé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '409':
          description: Email déjà utilisé

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Vérifier l'email via token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Email vérifié, compte activé

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Demande de réinitialisation de mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email de réinitialisation envoyé

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Réinitialiser le mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Mot de passe mis à jour

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Changer le mot de passe (utilisateur connecté)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Mot de passe changé

  # ==================== USERS ====================
  /users:
    get:
      tags: [Users]
      summary: Liste des utilisateurs
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Liste des utilisateurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      tags: [Users]
      summary: Détail d'un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Utilisateur non trouvé
    patch:
      tags: [Users]
      summary: Mettre à jour un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
      responses:
        '200':
          description: Utilisateur mis à jour

  /users/{id}/role:
    put:
      tags: [Users]
      summary: Changer le rôle d'un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Rôle mis à jour

  /users/{id}/toggle-active:
    post:
      tags: [Users]
      summary: Activer/désactiver un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
      responses:
        '200':
          description: Statut mis à jour

  # ==================== ROLES ====================
  /roles/users/{userId}:
    get:
      tags: [Roles]
      summary: Obtenir les rôles d'un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des rôles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserRoleRecord'

  /roles/users/{userId}/roles:
    post:
      tags: [Roles]
      summary: Ajouter un rôle à un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/AppRole'
      responses:
        '201':
          description: Rôle ajouté

  /roles/users/{userId}/roles/{role}:
    delete:
      tags: [Roles]
      summary: Supprimer un rôle d'un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: role
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/AppRole'
      responses:
        '204':
          description: Rôle supprimé

  /roles/users/{userId}/manager-permissions:
    get:
      tags: [Roles]
      summary: Obtenir les permissions manager
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Permissions manager
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManagerPermissions'
    put:
      tags: [Roles]
      summary: Mettre à jour les permissions manager
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [canCreateManagers]
              properties:
                canCreateManagers:
                  type: boolean
      responses:
        '200':
          description: Permissions mises à jour

  # ==================== INTERVENTIONS ====================
  /interventions:
    get:
      tags: [Interventions]
      summary: Liste des interventions
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/InterventionStatus'
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/InterventionCategory'
        - name: clientId
          in: query
          schema:
            type: string
            format: uuid
        - name: technicianId
          in: query
          schema:
            type: string
            format: uuid
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Liste des interventions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Intervention'
    post:
      tags: [Interventions]
      summary: Créer une intervention
      description: |
        Crée l'intervention, géocode l'adresse, génère un tracking_code,
        et déclenche le dispatch automatique en arrière-plan.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterventionRequest'
      responses:
        '201':
          description: Intervention créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intervention'

  /interventions/{id}:
    get:
      tags: [Interventions]
      summary: Détail d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Intervention trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intervention'

  /interventions/{id}/status:
    put:
      tags: [Interventions]
      summary: Changer le statut d'une intervention
      description: |
        Met à jour le statut. Calcule automatiquement les temps de trajet
        (travel_time_seconds), de durée (intervention_duration_seconds).
        Envoie des notifications au client (email, SMS, push).
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/InterventionStatus'
                oldStatus:
                  $ref: '#/components/schemas/InterventionStatus'
      responses:
        '200':
          description: Statut mis à jour

  /interventions/{id}/assign:
    post:
      tags: [Interventions]
      summary: Assigner manuellement un technicien
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [technicianId]
              properties:
                technicianId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Technicien assigné

  /interventions/{id}/cancel:
    post:
      tags: [Interventions]
      summary: Annuler une intervention (simple, sans frais)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Intervention annulée

  /interventions/{id}/toggle-active:
    post:
      tags: [Interventions]
      summary: Activer/désactiver une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
      responses:
        '200':
          description: Statut actif mis à jour

  /interventions/track/{trackingCode}:
    get:
      tags: [Interventions]
      summary: Suivre une intervention par code de suivi (public)
      parameters:
        - name: trackingCode
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Intervention trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Intervention'

  # ==================== DISPATCH ====================
  /dispatch/intervention:
    post:
      tags: [Dispatch]
      summary: Actions de dispatch
      description: |
        Point d'entrée unique pour toutes les actions de dispatch.
        Actions: dispatch, accept, reject, decline, cancel, go, notify.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interventionId, action]
              properties:
                interventionId:
                  type: string
                  format: uuid
                technicianId:
                  type: string
                  format: uuid
                action:
                  type: string
                  enum: [dispatch, accept, reject, decline, cancel, go, notify]
                reason:
                  type: string
      responses:
        '200':
          description: Résultat du dispatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchResult'

  /dispatch/attempts:
    get:
      tags: [Dispatch]
      summary: Tentatives de dispatch pour une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des tentatives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DispatchAttempt'

  /dispatch/attempts/current:
    get:
      tags: [Dispatch]
      summary: Tentative en cours pour une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tentative en cours
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DispatchAttempt'

  /dispatch/technician/{technicianId}/pending:
    get:
      tags: [Dispatch]
      summary: Assignations en attente pour un technicien
      security:
        - bearerAuth: []
      parameters:
        - name: technicianId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Assignations en attente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DispatchAttempt'

  # ==================== QUOTES ====================
  /quotes/lines:
    get:
      tags: [Quotes]
      summary: Obtenir les lignes de devis d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lignes de devis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuoteLine'
    post:
      tags: [Quotes]
      summary: Sauvegarder des lignes de devis
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [interventionId, lines]
              properties:
                interventionId:
                  type: string
                  format: uuid
                lines:
                  type: array
                  items:
                    $ref: '#/components/schemas/QuoteLineInput'
      responses:
        '201':
          description: Lignes sauvegardées
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuoteLine'

  # ==================== QUOTE MODIFICATIONS ====================
  /quote-modifications:
    post:
      tags: [QuoteModifications]
      summary: Créer une modification de devis
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteModificationInput'
      responses:
        '201':
          description: Modification créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteModification'

  /quote-modifications/{id}:
    get:
      tags: [QuoteModifications]
      summary: Obtenir une modification par ID
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Modification trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteModification'

  /quote-modifications/by-token/{token}:
    get:
      tags: [QuoteModifications]
      summary: Obtenir une modification par token de notification (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Modification trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteModification'

  /quote-modifications/by-intervention/{interventionId}:
    get:
      tags: [QuoteModifications]
      summary: Toutes les modifications d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Liste des modifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuoteModification'

  /quote-modifications/by-intervention/{interventionId}/pending:
    get:
      tags: [QuoteModifications]
      summary: Modification en attente d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Modification en attente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteModification'

  /quote-modifications/{id}/approve:
    post:
      tags: [QuoteModifications]
      summary: Approuver une modification de devis
      description: |
        Approuve la modification et incrémente l'autorisation de paiement Stripe
        du montant additionnel.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                signatureData:
                  type: string
                  description: Signature base64 du client
      responses:
        '200':
          description: Modification approuvée

  /quote-modifications/{id}/decline:
    post:
      tags: [QuoteModifications]
      summary: Refuser une modification de devis
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Modification refusée

  # ==================== SERVICES ====================
  /services:
    get:
      tags: [Services]
      summary: Liste des services
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Liste des services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Service'

  /services/{id}:
    patch:
      tags: [Services]
      summary: Mettre à jour un service
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceUpdate'
      responses:
        '200':
          description: Service mis à jour

  /services/{id}/toggle-active:
    post:
      tags: [Services]
      summary: Activer/désactiver un service
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
      responses:
        '200':
          description: Statut mis à jour

  /services/swap-order:
    post:
      tags: [Services]
      summary: Échanger l'ordre d'affichage de deux services
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serviceId1, order1, serviceId2, order2]
              properties:
                serviceId1:
                  type: string
                  format: uuid
                order1:
                  type: integer
                serviceId2:
                  type: string
                  format: uuid
                order2:
                  type: integer
      responses:
        '200':
          description: Ordre échangé

  # ==================== TECHNICIANS ====================
  /technicians/location:
    put:
      tags: [Technicians]
      summary: Mettre à jour la position GPS d'un technicien
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, latitude, longitude]
              properties:
                userId:
                  type: string
                  format: uuid
                latitude:
                  type: number
                  format: double
                longitude:
                  type: number
