openapi: 3.0.3
info:
  title: Depan.Pro Gateway API
  description: |
    Spécification OpenAPI corrigée — Gateway Spring Boot Depan.Pro.

    **Conventions appliquées :**
    - Ressources imbriquées sous leur parent (`/interventions/{id}/messages`)
    - Modifications partielles en PATCH, remplacement complet en PUT
    - Pas de verbe dans les URLs (toggle-active → PATCH .../active)
    - Actions métier en POST sur sous-ressource nommée (`/cancel`, `/approve`)
    - Un endpoint par action de dispatch (vs un endpoint multi-action)
    - Toutes les réponses enveloppées dans `ApiResponse<T>` ou `PageResponse<T>`

  version: 2.0.0

servers:
  - url: http://localhost:8080/api
    description: Développement local (Spring Boot, context-path /api)
  - url: https://api.depan-pro.com/api
    description: Production

tags:
  - name: Auth
  - name: Users
  - name: Roles
  - name: Interventions
  - name: History
  - name: Dispatch
  - name: Quotes
  - name: QuoteModifications
  - name: Services
  - name: Technicians
  - name: Partners
  - name: Ratings
  - name: Messages
  - name: Photos
  - name: WorkPhotos
  - name: Payment
  - name: Cancellation
  - name: Schedule
  - name: Revenue
  - name: Payouts
  - name: Disputes
  - name: Statistics
  - name: Performance
  - name: Configuration
  - name: Pricing
  - name: SiteSettings
  - name: Notifications
  - name: Storage
  - name: Geocoding
  - name: Questionnaire
  - name: Invoice

paths:

  # ==================== AUTH ====================
  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Connexion réussie — retourne access + refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Auth'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/register:
    post:
      tags: [Auth]
      summary: Inscription client (role=client, is_active=false)
      description: Hash BCrypt coût 10. Envoie email de vérification Thymeleaf.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Compte créé, email de vérification envoyé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Auth'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rafraîchir le token d'accès via refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Nouveau access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Auth'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Vérifier l'email via token (lien depuis email, sans auth)
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email vérifié, compte activé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Demander une réinitialisation de mot de passe
      description: Répond toujours 200 pour éviter l'énumération d'emails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Email envoyé si le compte existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'

  /auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirmer la réinitialisation du mot de passe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Mot de passe mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ==================== USERS ====================
  /users:
    get:
      tags: [Users]
      summary: Liste paginée des utilisateurs (admin/manager)
      security:
        - bearerAuth: []
      parameters:
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: search
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page d'utilisateurs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_User'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/me:
    get:
      tags: [Users]
      summary: Profil de l'utilisateur connecté
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'
    patch:
      tags: [Users]
      summary: Mettre à jour mon propre profil
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Profil mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'

  /users/me/password:
    patch:
      tags: [Users]
      summary: Changer son propre mot de passe (utilisateur connecté)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Mot de passe changé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Void'
        '400':
          $ref: '#/components/responses/BadRequest'

  /users/{id}:
    get:
      tags: [Users]
      summary: Détail d'un utilisateur (admin/manager)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Utilisateur trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Mettre à jour un utilisateur (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Utilisateur mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'

  /users/{id}/role:
    patch:
      tags: [Users]
      summary: Changer le rôle d'un utilisateur (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Rôle mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'

  /users/{id}/active:
    patch:
      tags: [Users]
      summary: Activer ou désactiver un utilisateur (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
      responses:
        '200':
          description: Statut mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_User'

  /users/{id}/roles:
    get:
      tags: [Roles]
      summary: Rôles d'un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Liste des rôles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_RoleList'
    post:
      tags: [Roles]
      summary: Ajouter un rôle à un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '201':
          description: Rôle ajouté

  /users/{id}/roles/{role}:
    delete:
      tags: [Roles]
      summary: Supprimer un rôle d'un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
        - name: role
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/UserRole'
      responses:
        '204':
          description: Rôle supprimé

  /users/{id}/permissions:
    get:
      tags: [Roles]
      summary: Permissions manager d'un utilisateur
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Permissions'
    patch:
      tags: [Roles]
      summary: Mettre à jour les permissions manager
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionsRequest'
      responses:
        '200':
          description: Permissions mises à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Permissions'
  # ==================== INTERVENTIONS ====================
  /interventions:
    get:
      tags: [Interventions]
      summary: Liste paginée des interventions
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/InterventionStatus'
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/InterventionCategory'
        - name: clientId
          in: query
          schema:
            type: string
            format: uuid
        - name: technicianId
          in: query
          schema:
            type: string
            format: uuid
        - name: isActive
          in: query
          schema:
            type: boolean
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Page d'interventions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_Intervention'
    post:
      tags: [Interventions]
      summary: Créer une intervention
      description: Géocode l'adresse, génère un tracking_code, déclenche le dispatch en arrière-plan.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInterventionRequest'
      responses:
        '201':
          description: Intervention créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'

  /interventions/my:
    get:
      tags: [Interventions]
      summary: Mes interventions (client connecté)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Interventions du client connecté
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_Intervention'

  /interventions/unassigned:
    get:
      tags: [Interventions]
      summary: Interventions sans technicien assigné (admin/manager)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: Interventions non assignées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse_Intervention'

  /interventions/track/{trackingCode}:
    get:
      tags: [Interventions]
      summary: Suivre une intervention par code de suivi (public, sans auth)
      parameters:
        - name: trackingCode
          in: path
          required: true
          schema:
            type: string
            example: DEP-12345-2026
      responses:
        '200':
          description: Intervention trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'
        '404':
          $ref: '#/components/responses/NotFound'

  /interventions/{id}:
    get:
      tags: [Interventions]
      summary: Détail d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Intervention trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Interventions]
      summary: Mise à jour partielle d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInterventionRequest'
      responses:
        '200':
          description: Intervention mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'

  /interventions/{id}/status:
    patch:
      tags: [Interventions]
      summary: Changer le statut d'une intervention
      description: Calcule travel_time_seconds, intervention_duration_seconds. Déclenche notifications.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/InterventionStatus'
                oldStatus:
                  $ref: '#/components/schemas/InterventionStatus'
      responses:
        '200':
          description: Statut mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'

  /interventions/{id}/active:
    patch:
      tags: [Interventions]
      summary: Activer ou désactiver une intervention
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
      responses:
        '200':
          description: Statut actif mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'

  /interventions/{id}/assign:
    post:
      tags: [Interventions]
      summary: Assigner manuellement un technicien (admin/manager)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [technicianId]
              properties:
                technicianId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Technicien assigné
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'

  /interventions/{id}/cancel:
    post:
      tags: [Interventions]
      summary: Annuler une intervention sans frais
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Intervention annulée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'

  # ==================== HISTORY ====================
  /interventions/{id}/history:
    get:
      tags: [History]
      summary: Historique d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Entrées d'historique
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_HistoryList'
    post:
      tags: [History]
      summary: Ajouter une entrée d'historique
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddHistoryRequest'
      responses:
        '201':
          description: Entrée ajoutée

  # ==================== DISPATCH ====================
  /dispatch/interventions/{id}/start:
    post:
      tags: [Dispatch]
      summary: Lancer le dispatch automatique d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Résultat du dispatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DispatchResult'

  /dispatch/interventions/{id}/manual:
    post:
      tags: [Dispatch]
      summary: Dispatch manuel vers un technicien spécifique (admin)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [technicianId]
              properties:
                technicianId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Dispatch manuel effectué
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DispatchResult'

  /dispatch/interventions/{id}/accept:
    post:
      tags: [Dispatch]
      summary: Technicien accepte l'assignation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Assignation acceptée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DispatchResult'

  /dispatch/interventions/{id}/reject:
    post:
      tags: [Dispatch]
      summary: Technicien refuse l'assignation
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Assignation refusée — dispatch prochain candidat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DispatchResult'

  /dispatch/interventions/{id}/go:
    post:
      tags: [Dispatch]
      summary: Technicien signale son départ (→ statut on_route)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Statut mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DispatchResult'

  /dispatch/attempts:
    get:
      tags: [Dispatch]
      summary: Toutes les tentatives de dispatch d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tentatives
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AttemptList'

  /dispatch/attempts/current:
    get:
      tags: [Dispatch]
      summary: Tentative en cours pour une intervention
      security:
        - bearerAuth: []
      parameters:
        - name: interventionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tentative en cours (null si aucune)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_DispatchAttempt'

  /dispatch/technicians/{technicianId}/pending:
    get:
      tags: [Dispatch]
      summary: Assignations en attente pour un technicien
      security:
        - bearerAuth: []
      parameters:
        - name: technicianId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Assignations en attente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_AttemptList'

  # ==================== QUOTES ====================
  /interventions/{id}/quotes/lines:
    get:
      tags: [Quotes]
      summary: Lignes de devis d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Lignes de devis
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_QuoteLineList'
    post:
      tags: [Quotes]
      summary: Sauvegarder les lignes de devis (remplace les existantes)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lines]
              properties:
                lines:
                  type: array
                  items:
                    $ref: '#/components/schemas/QuoteLineInput'
      responses:
        '201':
          description: Lignes sauvegardées
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_QuoteLineList'

  /interventions/{id}/quotes/sign:
    post:
      tags: [Quotes]
      summary: Signer électroniquement le devis (client)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signatureData]
              properties:
                signatureData:
                  type: string
                  description: Signature canvas en base64
      responses:
        '200':
          description: Devis signé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_Intervention'

  # ==================== QUOTE MODIFICATIONS ====================
  /interventions/{id}/quote-modifications:
    get:
      tags: [QuoteModifications]
      summary: Toutes les modifications de devis d'une intervention
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Liste des modifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse_QuoteModList'
    post:
      tags: [QuoteModifications]
